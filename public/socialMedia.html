<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media</title>
  <link rel="stylesheet" href="stylesheets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
  <script src="./javascripts/utils.js"></script>
  <script src="javascripts/script.js" defer type="module"></script>
  <script
    async
    src="https://platform.twitter.com/widgets.js"
    charset="utf-8"
  ></script>
</head>

<body>
  <div class="container" id="app">
    <header>
      <nav class="menu-bar">
        <div class="logo">{{ logoText }}</div>
        <ul>
          <li
            v-for="item in menuItems"
            :key="item.text"
            :class="{ 'signup-login': item.alignRight }"
          >
            <a :href="item.link">{{ item.text }}</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="SMPage">
      <h1>Latest Animals News:</h1>
      <div id="tweetContainer"></div>
      <h1>Our Last Event:</h1>
      <div id="igContainer1"></div>
      <div class="description">
        <div class="center">
          <button type="button" class="button" id="instaPostButton1">
              Click the post or here for more details
          </button>
        </div>
      </div>

      <h1>Our Upcoming Event:</h1>
      <div id="igContainer2"></div>
      <div class="description">
        <div class="center">
          <button type="button" class="button" id="instaPostButton2">
              Click the post or here for more details
          </button>
        </div>
      </div>

      <div class="remaining-space">
        <div class="SMIcon">
          <h4>Follow US On</h4>

            </svg>
          </a>
        </div>
      </div>
      <footer>

        <p>© 2024 WDC Grp65. No rights reserved.</p>
      </footer>
    </main>

    <div class="dark-mode-toggle" @click="toggleDarkMode()">
      <img :src="darkMode ? 'assets/icons/lightBulb-off.svg' : 'assets/icons/lightBulb-on.svg'" />
    </div>

    <script src="app.js"></script>
  </div>
</body>
</html>
