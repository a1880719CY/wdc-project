<!DOCTYPE html>
<html lang="en" class="main">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Our Koala</title>
    <link rel="stylesheet" href="stylesheets/login.css" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="javascripts/utils.js"></script>
    <script src="javascripts/script.js" defer type="module"></script>
    <script src="../app.js"></script>
  </head>

  <body>
    <div class="container" id="app">
      <video class="fullscreenVideo" id="bgVid" playsinline="" autoplay="" muted="" loop="">
        <source src="./assets/images/log/v-21.mp4" type="video/mp4">
    </video>
    <div class="main">
        <form onsubmit="event.preventDefault();"  v-if="isLogin">
            <table class="formtable">
                <thead>
                    <tr>
                        <th><img style="width: 30%;" src="./assets/images/log/gif.gif" alt=""></th>
                    </tr>
                    <tr>
                        <th style="font-size: 28px;color: #7b6c6c;
                        font-family: 楷体;">Login to the system</th>
                    </tr>
                </thead>
                <tbody id="aaa">
                    <tr>
                        <td><input type="text" class="formInput" v-model="loginForm.username" placeholder="username" autocomplete="off"></td>
                    </tr>
                    <tr>
                        <td><input type="password" class="formInput" v-model="loginForm.password"  placeholder="password" autocomplete="off"></td>
                    </tr>
                    <tr>
                        <td><select class="formInput" v-model="loginForm.role" placeholder="role">
                            <option value="1">user</option>
                            <option value="2">manager</option>
                            <option value="3">admin</option>
                        </select></td>
                    </tr>
                </tbody>
                <tfoot style=" display: flex;flex-direction: column;align-items: center;">
                    <tr style="width: 100%;">
                        <td style="font-size: 12px;color: #888;">
                            <div style="margin-bottom: 10px;">No account？<span  style="color: blue;text-decoration: none;" @click="register('register')">register</span></div>
                           
                        </td>
                        <td><button class="btn" @click="loginSubmit('login')">login</button></td>
                    </tr>
                    <tr style="margin-top: 10px;">
                       
                    </tr>
                    <tr style="margin-top: 10px;color: #888;">
                        <td style="font-size: 12px">
                          
                        </td>
                    </tr>
                </tfoot>
            </table>
        </form>



        <form onsubmit="event.preventDefault();"  v-if="isLogin==false">
            <table class="formtable">
                <thead>
                    <tr>
                        <th style="font-size: 28px;color: #7b6c6c;
                        font-family: 楷体;">Registered users</th>
                    </tr>
                </thead>
                <tbody id="aaa">
                    <tr>
                        <td><input type="text" class="formInput" v-model="loginForm.username" placeholder="username" autocomplete="off"></td>
                    </tr>
                   
                    <tr>
                        <td><input type="password" class="formInput" v-model="loginForm.password"  placeholder="password" autocomplete="off"></td>
                    </tr>
                    <tr>
                        <td><input type="text" class="formInput" v-model="loginForm.fullName"  placeholder="fullName" autocomplete="off"></td>
                    </tr>
                    <tr v-if="loginForm.role==1">
                        <td><input type="email" class="formInput" v-model="loginForm.email"  placeholder="email" autocomplete="off"></td>
                    </tr>
                    <tr>
                        <td><select class="formInput" v-model="loginForm.role" placeholder="role">
                            <option value="1">user</option>
                            <option value="2">manager</option>
                        </select></td>
                    </tr>
                </tbody>
                <tfoot style=" display: flex;flex-direction: column;align-items: center;">
                    <tr style="width: 100%;">
                        <td style="font-size: 12px;color: #888;">
                            <div style="margin-bottom: 10px;">Existing account？<span  style="color: blue;text-decoration: none;" @click="register('login')">register</span></div>
                           
                        </td>
                        <td><button class="btn" @click="loginSubmit('register')">login</button></td>
                    </tr>
                    <tr style="margin-top: 10px;">
                       
                    </tr>
                    <tr style="margin-top: 10px;color: #888;">
                        <td style="font-size: 12px">
                          
                        </td>
                    </tr>
                </tfoot>
            </table>
        </form>
     <div>
  </body>
</html>
