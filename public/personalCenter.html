<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personalCenter</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <link rel="stylesheet" href="stylesheets/personalCenter.css" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="./javascripts/utils.js"></script>
    <script src="javascripts/script.js" defer type="module"></script>
    <script src="../app.js"></script>
</head>
<body>
    <div class="container" id="app">
        <app-header></app-header>
        <div class="form">
            <div class="item"><label >username:</label><input type="text" v-model="loginForm.username" disabled></div>
            <div class="item"><label >fullName:</label><input type="text" v-model="loginForm.fullName"></div>
            <div class="item"><label >email:</label><input type="text" v-model="loginForm.email"></div>
            <div class="item"><label >password:</label><input type="password" v-model="loginForm.password"></div>
            <div class="item">
                <button @click="preserve">preserve</button>
            </div>
        </div>

    </div>
</body>
</html>
