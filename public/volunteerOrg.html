<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>volunteerOrg</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="./javascripts/utils.js"></script>
    <script src="javascripts/script.js" defer type="module"></script>
    <script src="../app.js"></script>
  </head>
  <body>
    <div  class="container" id="app">
        <app-header></app-header>
        <ul class="ulli" v-if="volunteerOrgList.length != 0">
            <li
              v-for="(item, index) in volunteerOrgList"
              :key="item.id"
              loop="infinite"
              :style="{
                background: `url(${item.background})`,
                position: 'relative',
                'background-color': '#fff',
                'border-radius': '7px',
                'box-sizing': 'border-box',
                'background-size': 'cover',
                'background-position': '50%',
              }"
              @mouseleave="(index1 = -1), (isflag1 = false)"
              @mouseenter="index1 = index"
              @click.stop="handleGet(item)"
            >
              <div
                :style="{
                  background: item.background
                    ? 'linear-gradient(rgba(0,0,0,.1),rgba(0,0,0,.8))'
                    : '',
                }"
              >
                <p
                  :style="{
                    color: item.background
                      ? '#fff ' + '!important'
                      : '#000 ' + '!important',
                  }"
                >
                  {{ item.volunteerManagerName }}
                </p>
                </div>

                <div class="box">
                  <div
                    class="box1"
                    :style="{
                      color: item.background
                        ? '#fff ' + '!important'
                        : '#000 ' + '!important',
                    }"
                  >
                    <span style="font-size: 18px; vertical-align: middle">{{
                      item.name
                    }}</span>
                  </div>
                  <div
                    class="box2"
                    :style="{
                    height:'75px',
                    margin: '80px 0 0 0',
                      'line-height': '25px',
                      color: item.background
                        ? '#fff ' + '!important'
                        : '#000 ' + '!important',
                    }"
                  >
                    <i
                      class="iconfont icon-caidankanzhaopian"
                      :style="{
                        color: item.background
                          ? '#fff ' + '!important'
                          : '#000 ' + '!important',
                      }"
                    />
                    <span style="margin-right: 10px;height:75px;
                    display: -webkit-box;
                    -webkit-box-orient: vertical;
                    -webkit-line-clamp: 3;
                    overflow: hidden;
                    text-overflow: ellipsis;">
                      {{ item.introduce }}</span>
                    <!-- <span style=""> {{ item.expectedEndTime }}</span> -->
                  </div>
                </div>
              </div>
            </li>
          </ul>
    </div>
  </body>
</html>
