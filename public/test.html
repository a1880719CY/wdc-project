<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Slideshow with Captions</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Verdana, sans-serif; margin: 0; }
        .slideshow-container {
            max-width: 1000px;
            position: relative;
            margin: auto;
        }
        .mySlides {
            display: none;
            animation-name: fade;
            animation-duration: 1.5s;
        }
        img { vertical-align: middle; width: 100%; }
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
        }

        .next {
          right: 0; border-radius: 3px 0 0 3px;
        }
        .prev:hover, .next:hover {
          background-color: rgba(0,0,0,0.8); 
          }
        .text {
            color: #f2f2f2;
            font-size: 15px;
            padding: 8px 12px;
            position: absolute;
            bottom: 8px;
            width: 100%;
            text-align: center;
        }
        .numbertext {
            color: #f2f2f2;
            font-size: 12px;
            padding: 8px 12px;
            position: absolute;
            top: 0;
        }
        .dot-container {
            text-align: center;
            padding: 10px;
        }
        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 2px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }
        .active, .dot:hover { background-color: #717171; }
        @keyframes fade {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
        @media only screen and (max-width: 300px) {
            .prev, .next, .text { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="slideshow-container">
            <div v-for="(slide, index) in slides" :key="index" class="mySlides" :class="{ fade: slideIndex === index + 1 }">
                <div class="numbertext">{{ index + 1 }} / {{ slides.length }}</div>
                <img :src="slide.image" alt="">
                <div class="text">{{ slide.caption }}</div>
            </div>
            <a class="prev" @click="changeSlide(-1)">❮</a>
            <a class="next" @click="changeSlide(1)">❯</a>
        </div>
        <div class="dot-container">
            <span v-for="(slide, index) in slides" :key="index" class="dot" :class="{ active: slideIndex === index + 1 }" @click="goToSlide(index + 1)"></span>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                slideIndex: 1,
                slides: [
                    { image: '../assets/images/heroImage/Hero_Koala.jpg', caption: 'Caption Text' },
                    { image: '../assets/images/heroImage/Hero_LeadbeatersPossum.jpg', caption: 'Caption Two' },
                    { image: '../assets/images/heroImage/Hero_NorthernHairyNosedWombat.jpg', caption: 'Caption Three' }
                ]
            },
            methods: {
                changeSlide(n) {
                    this.slideIndex += n;
                    if (this.slideIndex > this.slides.length) {
                        this.slideIndex = 1;
                    }
                    if (this.slideIndex < 1) {
                        this.slideIndex = this.slides.length;
                    }
                },
                goToSlide(n) {
                    this.slideIndex = n;
                }
            },
            mounted() {
                setInterval(() => {
                    this.changeSlide(1);
                }, 3000); // Change slide every 3 seconds
            }
        });
    </script>
</body>
</html>
